# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# Hyprlock config for => 2k monitor resolutions
# Original config submitted by https://github.com/SherLock707                                                                    
# Modified by fusion-gen

source = $HOME/.config/hypr/wallust/wallust-hyprland.conf
$Scripts = $HOME/.config/hypr/scripts

general {
    grace = 1
    fractional_scaling = 2
    immediate_render = true
}

background {
    monitor =
    path = screenshot
    
    color = rgb(0,0,0)

    blur_size = 3
    blur_passes = 2 
    noise = 0.0117
    contrast = 1.3000 
    brightness = 0.8000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}

# Date
label {
    monitor =
    text = cmd[update:18000000] echo "<b> "$(date +'%A, %B %e, %Y')" </b>"
    color = $color7
    font_size = 64
    font_family = JetBrainsMono Nerd Font Bold Italic
    position = 0, -20
    halign = center
    valign = center
}

# Hour-Time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%I:%M %p")"
    color = $color13
    font_size = 173
    font_family = JetBrainsMono Nerd Font ExtraBold 
    position = 0, -133
    halign = center
    valign = top
}

# USER
label {
    monitor =
    text =   $USER
    color = $color8
    font_size = 48
    font_family = JetBrainsMono Nerd Font Bold Italic
    position = 0, 300
    halign = center
    valign = bottom
}

# INPUT FIELD
input-field {
    monitor =
    size = 306, 93
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = $color8
    inner_color = rgba(255, 255, 255, 0.1)
    capslock_color = rgb(255,255,255)
    font_color = $color13
    fade_on_empty = false
    font_family = JetBrainsMono Nerd Font Bold Italic
    placeholder_text = <i><span foreground="##ffffff99">Type Password</span></i>
    hide_input = false
    position = 0, 100
    halign = center
    valign = bottom
}
